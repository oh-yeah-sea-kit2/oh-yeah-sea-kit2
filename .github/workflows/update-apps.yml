name: Update-Released-Apps

on:
  schedule:
    - cron: "0 21 * * *" # 毎日 JST 6:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update apps table in README
        run: python3 scripts/update_apps.py
      - name: Commit and push if changed
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: update released apps table"
            git push
          fi
